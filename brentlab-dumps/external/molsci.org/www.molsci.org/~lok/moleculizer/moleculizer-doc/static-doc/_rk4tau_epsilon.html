<H1>epsilon</H1>
<p>(/<a href="_rk4tau.html">rk4tau</a>/<a href="_rk4tau_epsilon.html">epsilon</a>)</p>
<hr>
<p>This element is used to control the accuracy of the tau-leaping simulation.  The smaller this number is, the harder rk4tau will try to accurately reflect true stochastic simulation.</p>
