<H1>multiplicity</H1>
<p>(/<a href="_rk4tau.html">rk4tau</a>/<a href="_rk4tau_reactions.html">reactions</a>/<a href="_rk4tau_reactions_reaction.html">reaction</a>/<a href="_rk4tau_reactions_reaction_reaction-product.html">reaction-product</a>/<a href="_rk4tau_reactions_reaction_reaction-product_@multiplicity.html">@multiplicity</a>)</p>
<hr>
<p>Here, you give the multiplicity of the product species; that is, how many molecules of the product species come out of the reaction.  This should be a positive integer, like 1 or 2.</p>
